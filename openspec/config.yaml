schema: spec-driven

# Project context
context: |
  Tech stack: Go with Bubbletea/Lipgloss for TUI
  Domain: tmux activity monitor - a TUI app for watching tmux panes

  Key libraries:
  - github.com/charmbracelet/bubbletea - TUI framework
  - github.com/charmbracelet/lipgloss - Styling
  - github.com/charmbracelet/bubbles - Common TUI components

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

rules:
  tasks:
    - "When adding CLI flags, include a task to update: printHelp() in main.go, README.md CLI Flags section, and config.example.yaml if a config option is involved."
    - "When adding keybindings, include a task to update: README.md Keybindings section and the help footer in app.go."
    - "When adding config options, include a task to update: README.md Configuration Options table and config.example.yaml."
    - "Always include a task to update CHANGELOG.md under [Unreleased]."
